name: AWS S3 Region Benchmark

on:
  workflow_dispatch:
    inputs:
      benchmark_mode:
        description: "'aws-region-upload' tests real uploads to each AWS region; 'signing-region' tests your configured endpoint in parallel"
        required: false
        default: aws-region-upload
        type: choice
        options:
          - aws-region-upload
          - signing-region
      regions:
        description: "Comma-separated regions to test"
        required: false
        default: us-east-1,us-east-2,us-west-1,us-west-2,af-south-1,ap-east-1,ap-east-2,ap-south-1,ap-south-2,ap-southeast-1,ap-southeast-2,ap-southeast-3,ap-southeast-4,ap-southeast-5,ap-southeast-6,ap-southeast-7,ap-northeast-1,ap-northeast-2,ap-northeast-3,ca-central-1,ca-west-1,eu-central-1,eu-central-2,eu-west-1,eu-west-2,eu-west-3,eu-north-1,eu-south-1,eu-south-2,il-central-1,me-south-1,me-central-1,mx-central-1,sa-east-1
        type: string
      bucket_prefix:
        description: "Bucket name prefix for AWS region upload mode"
        required: false
        default: godingtalk-s3-bench
        type: string
      timeout_seconds:
        description: "Per-region upload timeout in seconds"
        required: false
        default: "30"
        type: string
      payload_mib:
        description: "Payload size in MiB"
        required: false
        default: "10"
        type: string

permissions:
  contents: read

concurrency:
  group: s3-region-benchmark-${{ github.ref }}-${{ inputs.benchmark_mode }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      regions_json: ${{ steps.prepare.outputs.regions_json }}
      target_host: ${{ steps.prepare.outputs.target_host }}
    env:
      BENCHMARK_MODE: ${{ inputs.benchmark_mode }}
      REGIONS_INPUT: ${{ inputs.regions }}
      S3_ENDPOINT: ${{ secrets.GODINGTALK_S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.GODINGTALK_S3_BUCKET }}
      BENCHMARK_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_BENCHMARK_ACCESS_KEY_ID }}
      BENCHMARK_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_BENCHMARK_SECRET_ACCESS_KEY }}
      LEGACY_S3_ACCESS_KEY_ID: ${{ secrets.GODINGTALK_S3_ACCESS_KEY_ID }}
      LEGACY_S3_SECRET_ACCESS_KEY: ${{ secrets.GODINGTALK_S3_SECRET_ACCESS_KEY }}
    steps:
      - id: prepare
        run: |
          set -euo pipefail
          if [ "${BENCHMARK_MODE}" = "signing-region" ]; then
            export AWS_ACCESS_KEY_ID="${LEGACY_S3_ACCESS_KEY_ID:-}"
            export AWS_SECRET_ACCESS_KEY="${LEGACY_S3_SECRET_ACCESS_KEY:-}"
            missing=0
            for name in S3_ENDPOINT S3_BUCKET AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY; do
              if [ -z "${!name}" ]; then
                echo "::error::Missing ${name}"
                missing=1
              fi
            done
            if [ "${missing}" -ne 0 ]; then
              exit 1
            fi
            target_host="$(python3 -c "import os, urllib.parse; print(urllib.parse.urlparse(os.environ['S3_ENDPOINT']).hostname or '')")"
            echo "Target host: ${target_host}"
          else
            ACCESS_KEY_ID="${BENCHMARK_AWS_ACCESS_KEY_ID:-${LEGACY_S3_ACCESS_KEY_ID:-}}"
            SECRET_ACCESS_KEY="${BENCHMARK_AWS_SECRET_ACCESS_KEY:-${LEGACY_S3_SECRET_ACCESS_KEY:-}}"
            missing=0
            if [ -z "${ACCESS_KEY_ID}" ]; then
              echo "::error::Missing AWS_BENCHMARK_ACCESS_KEY_ID or GODINGTALK_S3_ACCESS_KEY_ID"
              missing=1
            fi
            if [ -z "${SECRET_ACCESS_KEY}" ]; then
              echo "::error::Missing AWS_BENCHMARK_SECRET_ACCESS_KEY or GODINGTALK_S3_SECRET_ACCESS_KEY"
              missing=1
            fi
            if [ "${missing}" -ne 0 ]; then
              exit 1
            fi
            target_host="AWS S3 regional endpoints"
          fi
          regions_json="$(printf '%s' "${REGIONS_INPUT}" | jq -Rc 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')"
          echo "regions_json=${regions_json}" >> "${GITHUB_OUTPUT}"
          echo "target_host=${target_host}" >> "${GITHUB_OUTPUT}"

  benchmark:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJson(needs.prepare.outputs.regions_json) }}
    env:
      BENCHMARK_MODE: ${{ inputs.benchmark_mode }}
      S3_ENDPOINT: ${{ secrets.GODINGTALK_S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.GODINGTALK_S3_BUCKET }}
      BENCHMARK_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_BENCHMARK_ACCESS_KEY_ID }}
      BENCHMARK_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_BENCHMARK_SECRET_ACCESS_KEY }}
      BENCHMARK_AWS_SESSION_TOKEN: ${{ secrets.AWS_BENCHMARK_SESSION_TOKEN }}
      LEGACY_S3_ACCESS_KEY_ID: ${{ secrets.GODINGTALK_S3_ACCESS_KEY_ID }}
      LEGACY_S3_SECRET_ACCESS_KEY: ${{ secrets.GODINGTALK_S3_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate benchmark payload
        env:
          PAYLOAD_MIB: ${{ inputs.payload_mib }}
        run: |
          dd if=/dev/zero of="${RUNNER_TEMP}/s3-region-bench.bin" bs=1M count="${PAYLOAD_MIB}" status=none

      - name: Benchmark region
        env:
          REGION: ${{ matrix.region }}
          BUCKET_PREFIX: ${{ inputs.bucket_prefix }}
          TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}
        run: |
          set -euo pipefail
          FILE="${RUNNER_TEMP}/s3-region-bench.bin"
          RESULT_JSON="${RUNNER_TEMP}/result-${REGION}.json"
          RESULT_MD="${RUNNER_TEMP}/result-${REGION}.md"

          if [ "${BENCHMARK_MODE}" = "signing-region" ]; then
            export AWS_ACCESS_KEY_ID="${LEGACY_S3_ACCESS_KEY_ID:-}"
            export AWS_SECRET_ACCESS_KEY="${LEGACY_S3_SECRET_ACCESS_KEY:-}"
            python3 scripts/s3_signing_region_benchmark.py \
              --endpoint "${S3_ENDPOINT}" \
              --bucket "${S3_BUCKET}" \
              --key "bench/${GITHUB_RUN_ID}/${REGION}/20mb.bin" \
              --file "${FILE}" \
              --access-key "${AWS_ACCESS_KEY_ID}" \
              --secret-key "${AWS_SECRET_ACCESS_KEY}" \
              --region "${REGION}" \
              --timeout-seconds "${TIMEOUT_SECONDS}" \
              --output-json "${RESULT_JSON}" \
              --summary-md "${RESULT_MD}"
          else
            ACCESS_KEY_ID="${BENCHMARK_AWS_ACCESS_KEY_ID:-${LEGACY_S3_ACCESS_KEY_ID:-}}"
            SECRET_ACCESS_KEY="${BENCHMARK_AWS_SECRET_ACCESS_KEY:-${LEGACY_S3_SECRET_ACCESS_KEY:-}}"
            SESSION_TOKEN="${BENCHMARK_AWS_SESSION_TOKEN:-}"
            python3 scripts/aws_s3_region_benchmark.py \
              --access-key "${ACCESS_KEY_ID}" \
              --secret-key "${SECRET_ACCESS_KEY}" \
              --session-token "${SESSION_TOKEN}" \
              --file "${FILE}" \
              --regions "${REGION}" \
              --bucket-prefix "${BUCKET_PREFIX}" \
              --timeout-seconds "${TIMEOUT_SECONDS}" \
              --runner-label "GitHub Actions ubuntu-latest (US-hosted approximation)" \
              --output-jsonl "${RESULT_JSON}" \
              --summary-md "${RESULT_MD}" \
              --run-token "${GITHUB_RUN_ID}"
          fi

      - name: Upload region artifact
        uses: actions/upload-artifact@v4
        with:
          name: s3-region-benchmark-${{ github.run_id }}-${{ matrix.region }}
          path: |
            ${{ runner.temp }}/result-${{ matrix.region }}.json
            ${{ runner.temp }}/result-${{ matrix.region }}.md

  summarize:
    if: always()
    needs:
      - prepare
      - benchmark
    runs-on: ubuntu-latest
    env:
      BENCHMARK_MODE: ${{ inputs.benchmark_mode }}
    steps:
      - uses: actions/checkout@v4

      - name: Download region artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: s3-region-benchmark-${{ github.run_id }}-*
          path: ${{ runner.temp }}/artifacts
          merge-multiple: true

      - name: Build summary
        run: |
          set -euo pipefail
          SUMMARY_MD="${RUNNER_TEMP}/s3-region-bench.md"
          RESULTS_JSONL="${RUNNER_TEMP}/s3-region-bench.jsonl"
          python3 scripts/s3_region_summarize.py \
            --input-dir "${RUNNER_TEMP}/artifacts" \
            --mode "${BENCHMARK_MODE}" \
            --payload-mib "${{ inputs.payload_mib }}" \
            --runner-label "GitHub Actions ubuntu-latest (US-hosted approximation)" \
            --target "${{ needs.prepare.outputs.target_host }}" \
            --summary-md "${SUMMARY_MD}" \
            --output-jsonl "${RESULTS_JSONL}"
          cat "${SUMMARY_MD}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload merged summary
        uses: actions/upload-artifact@v4
        with:
          name: s3-region-benchmark-${{ github.run_id }}-summary
          path: |
            ${{ runner.temp }}/s3-region-bench.jsonl
            ${{ runner.temp }}/s3-region-bench.md
