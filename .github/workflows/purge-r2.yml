name: Purge R2

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type DELETE ALL R2 OBJECTS to continue
        required: true
        type: string

permissions:
  contents: read

jobs:
  purge:
    if: ${{ inputs.confirm == 'DELETE ALL R2 OBJECTS' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve R2 credentials
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_SECRET: ${{ secrets.GODINGTALK_R2_BUCKET }}
          R2_ACCESS_KEY_ID_SECRET: ${{ secrets.GODINGTALK_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY_SECRET: ${{ secrets.GODINGTALK_R2_SECRET_ACCESS_KEY }}
        run: |
          R2_BUCKET_VALUE="${R2_BUCKET_SECRET:-godingtalk-files}"
          R2_ACCESS_KEY_ID_VALUE="${R2_ACCESS_KEY_ID_SECRET}"
          R2_SECRET_ACCESS_KEY_VALUE="${R2_SECRET_ACCESS_KEY_SECRET}"
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ] || [ -z "${R2_ACCESS_KEY_ID_VALUE}" ] || [ -z "${R2_SECRET_ACCESS_KEY_VALUE}" ]; then
            echo "Missing R2 credentials. Please set CLOUDFLARE_ACCOUNT_ID, GODINGTALK_R2_ACCESS_KEY_ID, and GODINGTALK_R2_SECRET_ACCESS_KEY." >&2
            exit 1
          fi
          {
            echo "R2_ENDPOINT=https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
            echo "R2_BUCKET=${R2_BUCKET_VALUE}"
            echo "R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID_VALUE}"
            echo "R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY_VALUE}"
            echo "R2_REGION=auto"
          } >> "$GITHUB_ENV"

      - name: Delete all objects from R2
        run: |
          python3 scripts/s3_delete_all.py \
            --endpoint "${R2_ENDPOINT}" \
            --bucket "${R2_BUCKET}" \
            --access-key "${R2_ACCESS_KEY_ID}" \
            --secret-key "${R2_SECRET_ACCESS_KEY}" \
            --region "${R2_REGION}" \
            --timeout-seconds 300
