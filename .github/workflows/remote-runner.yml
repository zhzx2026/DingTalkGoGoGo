name: Remote Runner

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Job ID from the Worker control plane
        required: true
        type: string

permissions:
  contents: read

jobs:
  run-job:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      JOB_ID: ${{ inputs.job_id }}
      CONTROL_URL: ${{ secrets.GODINGTALK_CONTROL_URL }}
      INTERNAL_TOKEN: ${{ secrets.GODINGTALK_INTERNAL_TOKEN }}
      RAW_S3_ENDPOINT: ${{ secrets.GODINGTALK_S3_ENDPOINT }}
      RAW_S3_BUCKET: ${{ secrets.GODINGTALK_S3_BUCKET }}
      RAW_S3_ACCESS_KEY_ID: ${{ secrets.GODINGTALK_S3_ACCESS_KEY_ID }}
      RAW_S3_SECRET_ACCESS_KEY: ${{ secrets.GODINGTALK_S3_SECRET_ACCESS_KEY }}
      RAW_S3_REGION: ${{ secrets.GODINGTALK_S3_REGION }}
      LEGACY_R2_BUCKET: ${{ secrets.GODINGTALK_R2_BUCKET }}
      LEGACY_R2_ACCESS_KEY_ID: ${{ secrets.GODINGTALK_R2_ACCESS_KEY_ID }}
      LEGACY_R2_SECRET_ACCESS_KEY: ${{ secrets.GODINGTALK_R2_SECRET_ACCESS_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Build GoDingtalk
        run: go build -o GoDingtalk .

      - name: Validate private storage configuration
        continue-on-error: true
        run: |
          : > "${RUNNER_TEMP}/upload-error.txt"
          R2_ENDPOINT_VALUE=""
          R2_BUCKET_VALUE="${LEGACY_R2_BUCKET:-godingtalk-files}"
          R2_ACCESS_KEY_ID_VALUE="${LEGACY_R2_ACCESS_KEY_ID}"
          R2_SECRET_ACCESS_KEY_VALUE="${LEGACY_R2_SECRET_ACCESS_KEY}"
          R2_REGION_VALUE="auto"
          S3_ENDPOINT_VALUE="${RAW_S3_ENDPOINT}"
          S3_BUCKET_VALUE="${RAW_S3_BUCKET:-${LEGACY_R2_BUCKET:-godingtalk-files}}"
          AWS_ACCESS_KEY_ID_VALUE="${RAW_S3_ACCESS_KEY_ID:-${LEGACY_R2_ACCESS_KEY_ID}}"
          AWS_SECRET_ACCESS_KEY_VALUE="${RAW_S3_SECRET_ACCESS_KEY:-${LEGACY_R2_SECRET_ACCESS_KEY}}"
          AWS_DEFAULT_REGION_VALUE="${RAW_S3_REGION}"

          if [ -n "${CLOUDFLARE_ACCOUNT_ID}" ] && [ -n "${R2_ACCESS_KEY_ID_VALUE}" ] && [ -n "${R2_SECRET_ACCESS_KEY_VALUE}" ]; then
            R2_ENDPOINT_VALUE="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          fi

          if [ -z "${S3_ENDPOINT_VALUE}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID}" ] && [ -n "${AWS_ACCESS_KEY_ID_VALUE}" ] && [ -n "${AWS_SECRET_ACCESS_KEY_VALUE}" ]; then
            S3_ENDPOINT_VALUE="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          fi

          if [ -z "${AWS_DEFAULT_REGION_VALUE}" ]; then
            case "${S3_ENDPOINT_VALUE}" in
              *.r2.cloudflarestorage.com|*.r2.cloudflarestorage.com/)
                AWS_DEFAULT_REGION_VALUE="auto"
                ;;
              *hi168.com*)
                AWS_DEFAULT_REGION_VALUE="auto"
                ;;
              *)
                AWS_DEFAULT_REGION_VALUE="us-east-1"
                ;;
            esac
          fi

          if [ -z "${R2_ENDPOINT_VALUE}" ] || [ -z "${R2_BUCKET_VALUE}" ] || [ -z "${R2_ACCESS_KEY_ID_VALUE}" ] || [ -z "${R2_SECRET_ACCESS_KEY_VALUE}" ]; then
            echo "Missing R2 credentials. Please set CLOUDFLARE_ACCOUNT_ID with GODINGTALK_R2_BUCKET/GODINGTALK_R2_ACCESS_KEY_ID/GODINGTALK_R2_SECRET_ACCESS_KEY." > "${RUNNER_TEMP}/upload-error.txt"
            exit 0
          fi
          if [ -z "${S3_ENDPOINT_VALUE}" ] || [ -z "${S3_BUCKET_VALUE}" ] || [ -z "${AWS_ACCESS_KEY_ID_VALUE}" ] || [ -z "${AWS_SECRET_ACCESS_KEY_VALUE}" ]; then
            echo "Missing S3 credentials. Please set GODINGTALK_S3_ENDPOINT/GODINGTALK_S3_BUCKET/GODINGTALK_S3_ACCESS_KEY_ID/GODINGTALK_S3_SECRET_ACCESS_KEY." > "${RUNNER_TEMP}/upload-error.txt"
            exit 0
          fi
          {
            echo "R2_ENDPOINT=${R2_ENDPOINT_VALUE}"
            echo "R2_BUCKET=${R2_BUCKET_VALUE}"
            echo "R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID_VALUE}"
            echo "R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY_VALUE}"
            echo "R2_REGION=${R2_REGION_VALUE}"
            echo "S3_ENDPOINT=${S3_ENDPOINT_VALUE}"
            echo "S3_BUCKET=${S3_BUCKET_VALUE}"
            echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID_VALUE}"
            echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY_VALUE}"
            echo "AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION_VALUE}"
          } >> "$GITHUB_ENV"

      - name: Run remote job
        id: remote_job
        continue-on-error: true
        run: |
          ./GoDingtalk \
            -runRemoteJob \
            -controlURL "${CONTROL_URL}" \
            -internalToken "${INTERNAL_TOKEN}" \
            -jobID "${JOB_ID}" \
            -saveDir "${RUNNER_TEMP}/godingtalk" \
            -resultFile "${RUNNER_TEMP}/job-result.json"

      - name: Upload output files to R2 and S3
        if: always()
        continue-on-error: true
        run: |
          RESULT_FILE="${RUNNER_TEMP}/job-result.json"
          UPLOAD_FILE="${RUNNER_TEMP}/uploaded-files.json"
          ERROR_FILE="${RUNNER_TEMP}/upload-error.txt"
          PROGRESS_FILE="${RUNNER_TEMP}/job-progress.json"
          MANIFEST_FILE="${RUNNER_TEMP}/upload-manifest.jsonl"
          SAVE_DIR="${RUNNER_TEMP}/godingtalk"
          echo '[]' > "${UPLOAD_FILE}"
          : > "${MANIFEST_FILE}"

          report_progress() {
            local stage="$1"
            jq -n \
              --arg status "running" \
              --arg stage "${stage}" \
              --slurpfile files "${UPLOAD_FILE}" \
              '{status:$status, stage:$stage, files:$files[0], progress_percent:100}' > "${PROGRESS_FILE}"
            curl -sS --fail \
              -X POST "${CONTROL_URL}/internal/jobs/${JOB_ID}/progress" \
              -H "Authorization: Bearer ${INTERNAL_TOKEN}" \
              -H "Content-Type: application/json" \
              --data @"${PROGRESS_FILE}" > /dev/null || true
          }

          if [ ! -f "${RESULT_FILE}" ]; then
            exit 0
          fi

          if [ -s "${ERROR_FILE}" ]; then
            exit 0
          fi

          jq -cr '.files[]? | {
            local_path: .local_path,
            relative_path: (.relative_path // .name // ""),
            name: (.name // (.local_path | split("/") | last)),
            size_bytes: (.size_bytes // 0)
          }' "${RESULT_FILE}" >> "${MANIFEST_FILE}"

          if [ ! -s "${MANIFEST_FILE}" ] && [ -d "${SAVE_DIR}" ]; then
            while IFS= read -r -d '' file; do
              rel="${file#"${SAVE_DIR}/"}"
              name="$(basename "${file}")"
              size="$(stat -c%s "${file}")"
              jq -cn \
                --arg local_path "${file}" \
                --arg relative_path "${rel}" \
                --arg name "${name}" \
                --argjson size_bytes "${size:-0}" \
                '{local_path:$local_path, relative_path:$relative_path, name:$name, size_bytes:$size_bytes}' >> "${MANIFEST_FILE}"
            done < <(find "${SAVE_DIR}" -type f \( -iname '*.mp4' -o -iname '*.m4a' -o -iname '*.txt' \) -print0)
          fi

          while IFS= read -r entry; do
            JSON="$(printf '%s' "${entry}" | base64 --decode)"
            LOCAL_PATH="$(printf '%s' "${JSON}" | jq -r '.local_path')"
            RELATIVE_PATH="$(printf '%s' "${JSON}" | jq -r '.relative_path')"
            NAME="$(printf '%s' "${JSON}" | jq -r '.name')"
            SIZE_BYTES="$(printf '%s' "${JSON}" | jq -r '.size_bytes')"
            BASENAME="$(basename "${NAME}")"
            EXTENSION="${BASENAME##*.}"
            if [ "${EXTENSION}" = "${BASENAME}" ]; then
              EXTENSION=""
              RAW_TITLE="${BASENAME}"
            else
              RAW_TITLE="${BASENAME%.*}"
            fi
            MD5_FULL="$(md5sum "${LOCAL_PATH}" | awk '{print $1}')"
            MD5_SHORT="$(printf '%s' "${MD5_FULL}" | cut -c1-8)"
            if [ -n "${EXTENSION}" ]; then
              DISPLAY_NAME="${RAW_TITLE}-${MD5_SHORT}.${EXTENSION}"
              OBJECT_KEY="dedup/${MD5_FULL}.${EXTENSION}"
            else
              DISPLAY_NAME="${RAW_TITLE}-${MD5_SHORT}"
              OBJECT_KEY="dedup/${MD5_FULL}"
            fi

            CONTENT_TYPE="$(file --brief --mime-type "${LOCAL_PATH}" 2>/dev/null || true)"
            if [ -z "${CONTENT_TYPE}" ]; then
              case "${EXTENSION}" in
                mp4) CONTENT_TYPE="video/mp4" ;;
                m4a) CONTENT_TYPE="audio/mp4" ;;
                txt) CONTENT_TYPE="text/plain; charset=utf-8" ;;
                *) CONTENT_TYPE="application/octet-stream" ;;
              esac
            fi
            TMP_FILE="$(mktemp)"
            jq \
              --arg name "${DISPLAY_NAME}" \
              --arg relative_path "${RELATIVE_PATH}" \
              --arg bucket_key "" \
              --arg r2_bucket_key "" \
              --arg s3_bucket_key "" \
              --arg content_type "${CONTENT_TYPE}" \
              --argjson size_bytes "${SIZE_BYTES:-0}" \
              '. += [{
                "name": $name,
                "relative_path": $relative_path,
                "bucket_key": $bucket_key,
                "r2_bucket_key": $r2_bucket_key,
                "s3_bucket_key": $s3_bucket_key,
                "content_type": $content_type,
                "size_bytes": $size_bytes
              }]' \
              "${UPLOAD_FILE}" > "${TMP_FILE}"
            mv "${TMP_FILE}" "${UPLOAD_FILE}"
            report_progress "uploading_r2"
            if ! python3 scripts/s3_put.py \
              --endpoint "${R2_ENDPOINT}" \
              --bucket "${R2_BUCKET}" \
              --key "${OBJECT_KEY}" \
              --file "${LOCAL_PATH}" \
              --access-key "${R2_ACCESS_KEY_ID}" \
              --secret-key "${R2_SECRET_ACCESS_KEY}" \
              --region "${R2_REGION}" \
              --content-type "${CONTENT_TYPE}"; then
              echo "failed to upload ${NAME} to R2" > "${ERROR_FILE}"
              break
            fi
            TMP_FILE="$(mktemp)"
            jq \
              --arg relative_path "${RELATIVE_PATH}" \
              --arg bucket_key "${OBJECT_KEY}" \
              --arg r2_bucket_key "${OBJECT_KEY}" \
              'map(if .relative_path == $relative_path then . + {"bucket_key": $bucket_key, "r2_bucket_key": $r2_bucket_key} else . end)' \
              "${UPLOAD_FILE}" > "${TMP_FILE}"
            mv "${TMP_FILE}" "${UPLOAD_FILE}"
            report_progress "uploading_s3"
            if ! python3 scripts/s3_put.py \
              --endpoint "${S3_ENDPOINT}" \
              --bucket "${S3_BUCKET}" \
              --key "${OBJECT_KEY}" \
              --file "${LOCAL_PATH}" \
              --access-key "${AWS_ACCESS_KEY_ID}" \
              --secret-key "${AWS_SECRET_ACCESS_KEY}" \
              --region "${AWS_DEFAULT_REGION}" \
              --content-type "${CONTENT_TYPE}"; then
              echo "failed to upload ${NAME} to S3" > "${ERROR_FILE}"
              break
            fi

            TMP_FILE="$(mktemp)"
            jq \
              --arg relative_path "${RELATIVE_PATH}" \
              --arg s3_bucket_key "${OBJECT_KEY}" \
              'map(if .relative_path == $relative_path then . + {"s3_bucket_key": $s3_bucket_key} else . end)' \
              "${UPLOAD_FILE}" > "${TMP_FILE}"
            mv "${TMP_FILE}" "${UPLOAD_FILE}"
          done < <(while IFS= read -r line; do printf '%s' "${line}" | base64 | tr -d '\n'; printf '\n'; done < "${MANIFEST_FILE}")

      - name: Finalize remote job
        if: always()
        continue-on-error: true
        run: |
          RESULT_FILE="${RUNNER_TEMP}/job-result.json"
          UPLOAD_FILE="${RUNNER_TEMP}/uploaded-files.json"
          COMPLETE_FILE="${RUNNER_TEMP}/job-complete.json"
          ERROR_FILE="${RUNNER_TEMP}/upload-error.txt"

          if [ -f "${RESULT_FILE}" ]; then
            jq \
              --slurpfile files "${UPLOAD_FILE}" \
              --rawfile upload_error "${ERROR_FILE}" \
              '{
                status: (if ($upload_error | length) > 0 then "failed" else .status end),
                stage: (if (($upload_error | length) > 0 or .status != "succeeded") then "failed" else "completed" end),
                titles: .titles,
                errors: (if ($upload_error | length) > 0 then ((.errors // []) + [$upload_error]) else .errors end),
                files: $files[0],
                progress_percent: (if (($upload_error | length) > 0 or .status != "succeeded") then 0 else 100 end)
              }' \
              "${RESULT_FILE}" > "${COMPLETE_FILE}"
          else
            jq -n \
              --arg status "failed" \
              --arg stage "failed" \
              --arg message "GitHub Actions runner failed before producing a manifest. Inspect the workflow logs." \
              '{status:$status, stage:$stage, errors:[$message], files:[], progress_percent:0}' > "${COMPLETE_FILE}"
          fi

          curl -sS --fail \
            -X POST "${CONTROL_URL}/internal/jobs/${JOB_ID}/complete" \
            -H "Authorization: Bearer ${INTERNAL_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @"${COMPLETE_FILE}"
