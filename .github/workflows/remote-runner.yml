name: Remote Runner

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Job ID from the Worker control plane
        required: true
        type: string

permissions:
  contents: read

jobs:
  run-job:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      JOB_ID: ${{ inputs.job_id }}
      CONTROL_URL: ${{ secrets.GODINGTALK_CONTROL_URL }}
      INTERNAL_TOKEN: ${{ secrets.GODINGTALK_INTERNAL_TOKEN }}
      R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.GODINGTALK_R2_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.GODINGTALK_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.GODINGTALK_R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Build GoDingtalk
        run: go build -o GoDingtalk .

      - name: Validate private storage configuration
        continue-on-error: true
        run: |
          : > "${RUNNER_TEMP}/upload-error.txt"
          if [ -z "${R2_BUCKET}" ]; then
            echo "R2_BUCKET is empty, fallback to godingtalk-files"
            echo "R2_BUCKET=godingtalk-files" >> "$GITHUB_ENV"
          fi
          if [ -z "${R2_ACCOUNT_ID}" ] || [ -z "${AWS_ACCESS_KEY_ID}" ] || [ -z "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "Missing Cloudflare R2 credentials. Please set CLOUDFLARE_ACCOUNT_ID, GODINGTALK_R2_ACCESS_KEY_ID, GODINGTALK_R2_SECRET_ACCESS_KEY." > "${RUNNER_TEMP}/upload-error.txt"
            exit 0
          fi
          echo "R2_ENDPOINT=https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" >> "$GITHUB_ENV"

      - name: Run remote job
        id: remote_job
        continue-on-error: true
        run: |
          ./GoDingtalk \
            -runRemoteJob \
            -controlURL "${CONTROL_URL}" \
            -internalToken "${INTERNAL_TOKEN}" \
            -jobID "${JOB_ID}" \
            -saveDir "${RUNNER_TEMP}/godingtalk" \
            -resultFile "${RUNNER_TEMP}/job-result.json"

      - name: Upload output files to private R2
        if: always()
        continue-on-error: true
        run: |
          RESULT_FILE="${RUNNER_TEMP}/job-result.json"
          UPLOAD_FILE="${RUNNER_TEMP}/uploaded-files.json"
          ERROR_FILE="${RUNNER_TEMP}/upload-error.txt"
          MANIFEST_FILE="${RUNNER_TEMP}/upload-manifest.jsonl"
          SAVE_DIR="${RUNNER_TEMP}/godingtalk"
          echo '[]' > "${UPLOAD_FILE}"
          : > "${MANIFEST_FILE}"

          if [ ! -f "${RESULT_FILE}" ]; then
            exit 0
          fi

          if [ -s "${ERROR_FILE}" ]; then
            exit 0
          fi

          jq -cr '.files[]? | {
            local_path: .local_path,
            relative_path: (.relative_path // .name // ""),
            name: (.name // (.local_path | split("/") | last)),
            size_bytes: (.size_bytes // 0)
          }' "${RESULT_FILE}" >> "${MANIFEST_FILE}"

          if [ ! -s "${MANIFEST_FILE}" ] && [ -d "${SAVE_DIR}" ]; then
            while IFS= read -r -d '' file; do
              rel="${file#"${SAVE_DIR}/"}"
              name="$(basename "${file}")"
              size="$(stat -c%s "${file}")"
              jq -cn \
                --arg local_path "${file}" \
                --arg relative_path "${rel}" \
                --arg name "${name}" \
                --argjson size_bytes "${size:-0}" \
                '{local_path:$local_path, relative_path:$relative_path, name:$name, size_bytes:$size_bytes}' >> "${MANIFEST_FILE}"
            done < <(find "${SAVE_DIR}" -type f \( -iname '*.mp4' -o -iname '*.m4a' -o -iname '*.txt' \) -print0)
          fi

          while IFS= read -r entry; do
            JSON="$(printf '%s' "${entry}" | base64 --decode)"
            LOCAL_PATH="$(printf '%s' "${JSON}" | jq -r '.local_path')"
            RELATIVE_PATH="$(printf '%s' "${JSON}" | jq -r '.relative_path')"
            NAME="$(printf '%s' "${JSON}" | jq -r '.name')"
            SIZE_BYTES="$(printf '%s' "${JSON}" | jq -r '.size_bytes')"
            BASENAME="$(basename "${NAME}")"
            EXTENSION="${BASENAME##*.}"
            if [ "${EXTENSION}" = "${BASENAME}" ]; then
              EXTENSION=""
              RAW_TITLE="${BASENAME}"
            else
              RAW_TITLE="${BASENAME%.*}"
            fi
            MD5_FULL="$(md5sum "${LOCAL_PATH}" | awk '{print $1}')"
            MD5_SHORT="$(printf '%s' "${MD5_FULL}" | cut -c1-8)"
            if [ -n "${EXTENSION}" ]; then
              DISPLAY_NAME="${RAW_TITLE}-${MD5_SHORT}.${EXTENSION}"
              OBJECT_KEY="dedup/${MD5_FULL}.${EXTENSION}"
            else
              DISPLAY_NAME="${RAW_TITLE}-${MD5_SHORT}"
              OBJECT_KEY="dedup/${MD5_FULL}"
            fi

            if ! aws s3api head-object \
              --bucket "${R2_BUCKET}" \
              --key "${OBJECT_KEY}" \
              --endpoint-url "${R2_ENDPOINT}" >/dev/null 2>&1; then
              if ! aws s3 cp "${LOCAL_PATH}" "s3://${R2_BUCKET}/${OBJECT_KEY}" \
                --endpoint-url "${R2_ENDPOINT}" \
                --no-progress; then
                echo "failed to upload ${NAME} to R2" > "${ERROR_FILE}"
                break
              fi
            fi

            TMP_FILE="$(mktemp)"
            jq \
              --arg name "${DISPLAY_NAME}" \
              --arg relative_path "${RELATIVE_PATH}" \
              --arg bucket_key "${OBJECT_KEY}" \
              --argjson size_bytes "${SIZE_BYTES:-0}" \
              '. += [{
                "name": $name,
                "relative_path": $relative_path,
                "bucket_key": $bucket_key,
                "size_bytes": $size_bytes
              }]' \
              "${UPLOAD_FILE}" > "${TMP_FILE}"
            mv "${TMP_FILE}" "${UPLOAD_FILE}"
          done < <(while IFS= read -r line; do printf '%s' "${line}" | base64 | tr -d '\n'; printf '\n'; done < "${MANIFEST_FILE}")

      - name: Finalize remote job
        if: always()
        continue-on-error: true
        run: |
          RESULT_FILE="${RUNNER_TEMP}/job-result.json"
          UPLOAD_FILE="${RUNNER_TEMP}/uploaded-files.json"
          COMPLETE_FILE="${RUNNER_TEMP}/job-complete.json"
          ERROR_FILE="${RUNNER_TEMP}/upload-error.txt"

          if [ -f "${RESULT_FILE}" ]; then
            jq \
              --slurpfile files "${UPLOAD_FILE}" \
              --rawfile upload_error "${ERROR_FILE}" \
              '{
                status: (if ($upload_error | length) > 0 then "failed" else .status end),
                stage: (if (($upload_error | length) > 0 or .status != "succeeded") then "failed" else "completed" end),
                titles: .titles,
                errors: (if ($upload_error | length) > 0 then ((.errors // []) + [$upload_error]) else .errors end),
                files: (if ($upload_error | length) > 0 then [] else $files[0] end),
                progress_percent: (if (($upload_error | length) > 0 or .status != "succeeded") then 0 else 100 end)
              }' \
              "${RESULT_FILE}" > "${COMPLETE_FILE}"
          else
            jq -n \
              --arg status "failed" \
              --arg stage "failed" \
              --arg message "GitHub Actions runner failed before producing a manifest. Inspect the workflow logs." \
              '{status:$status, stage:$stage, errors:[$message], files:[], progress_percent:0}' > "${COMPLETE_FILE}"
          fi

          curl -sS --fail \
            -X POST "${CONTROL_URL}/internal/jobs/${JOB_ID}/complete" \
            -H "Authorization: Bearer ${INTERNAL_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @"${COMPLETE_FILE}"
