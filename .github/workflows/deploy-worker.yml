name: Deploy Worker

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install

      - name: Typecheck worker
        run: npm run typecheck

      - name: Check deploy credentials
        id: deploy_guard
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare credentials are missing, skip remote deploy."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync worker secrets
        if: ${{ steps.deploy_guard.outputs.enabled == 'true' }}
        run: |
          printf '%s' "${INTERNAL_API_TOKEN}" | npx wrangler secret put INTERNAL_API_TOKEN
          printf '%s' "${GITHUB_ACTIONS_TOKEN}" | npx wrangler secret put GITHUB_ACTIONS_TOKEN
          if [ -n "${AUTH_SALT}" ]; then
            printf '%s' "${AUTH_SALT}" | npx wrangler secret put AUTH_SALT
          fi
          if [ -n "${BOOTSTRAP_USERNAME}" ]; then
            printf '%s' "${BOOTSTRAP_USERNAME}" | npx wrangler secret put BOOTSTRAP_USERNAME
          fi
          if [ -n "${BOOTSTRAP_PASSWORD}" ]; then
            printf '%s' "${BOOTSTRAP_PASSWORD}" | npx wrangler secret put BOOTSTRAP_PASSWORD
          fi

          S3_ENDPOINT_VALUE="${RAW_S3_ENDPOINT}"
          S3_BUCKET_VALUE="${RAW_S3_BUCKET:-${LEGACY_R2_BUCKET:-godingtalk-files}}"
          S3_ACCESS_KEY_ID_VALUE="${RAW_S3_ACCESS_KEY_ID:-${LEGACY_R2_ACCESS_KEY_ID}}"
          S3_SECRET_ACCESS_KEY_VALUE="${RAW_S3_SECRET_ACCESS_KEY:-${LEGACY_R2_SECRET_ACCESS_KEY}}"
          S3_REGION_VALUE="${RAW_S3_REGION}"

          if [ -z "${S3_ENDPOINT_VALUE}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID}" ] && [ -n "${S3_ACCESS_KEY_ID_VALUE}" ] && [ -n "${S3_SECRET_ACCESS_KEY_VALUE}" ]; then
            S3_ENDPOINT_VALUE="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          fi

          if [ -n "${S3_ENDPOINT_VALUE}" ] && [ -n "${S3_BUCKET_VALUE}" ] && [ -n "${S3_ACCESS_KEY_ID_VALUE}" ] && [ -n "${S3_SECRET_ACCESS_KEY_VALUE}" ]; then
            if [ -z "${S3_REGION_VALUE}" ]; then
              case "${S3_ENDPOINT_VALUE}" in
                *.r2.cloudflarestorage.com|*.r2.cloudflarestorage.com/)
                  S3_REGION_VALUE="auto"
                  ;;
                *hi168.com*)
                  S3_REGION_VALUE="auto"
                  ;;
                *)
                  S3_REGION_VALUE="us-east-1"
                  ;;
              esac
            fi
            printf '%s' "${S3_ENDPOINT_VALUE}" | npx wrangler secret put S3_ENDPOINT
            printf '%s' "${S3_BUCKET_VALUE}" | npx wrangler secret put S3_BUCKET
            printf '%s' "${S3_ACCESS_KEY_ID_VALUE}" | npx wrangler secret put S3_ACCESS_KEY_ID
            printf '%s' "${S3_SECRET_ACCESS_KEY_VALUE}" | npx wrangler secret put S3_SECRET_ACCESS_KEY
            printf '%s' "${S3_REGION_VALUE}" | npx wrangler secret put S3_REGION
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INTERNAL_API_TOKEN: ${{ secrets.GODINGTALK_INTERNAL_TOKEN }}
          GITHUB_ACTIONS_TOKEN: ${{ secrets.GODINGTALK_GITHUB_ACTIONS_TOKEN }}
          AUTH_SALT: ${{ secrets.GODINGTALK_AUTH_SALT }}
          BOOTSTRAP_USERNAME: ${{ secrets.GODINGTALK_BOOTSTRAP_USERNAME }}
          BOOTSTRAP_PASSWORD: ${{ secrets.GODINGTALK_BOOTSTRAP_PASSWORD }}
          RAW_S3_ENDPOINT: ${{ secrets.GODINGTALK_S3_ENDPOINT }}
          RAW_S3_BUCKET: ${{ secrets.GODINGTALK_S3_BUCKET }}
          RAW_S3_ACCESS_KEY_ID: ${{ secrets.GODINGTALK_S3_ACCESS_KEY_ID }}
          RAW_S3_SECRET_ACCESS_KEY: ${{ secrets.GODINGTALK_S3_SECRET_ACCESS_KEY }}
          RAW_S3_REGION: ${{ secrets.GODINGTALK_S3_REGION }}
          LEGACY_R2_BUCKET: ${{ secrets.GODINGTALK_R2_BUCKET }}
          LEGACY_R2_ACCESS_KEY_ID: ${{ secrets.GODINGTALK_R2_ACCESS_KEY_ID }}
          LEGACY_R2_SECRET_ACCESS_KEY: ${{ secrets.GODINGTALK_R2_SECRET_ACCESS_KEY }}

      - name: Apply D1 migrations
        if: ${{ steps.deploy_guard.outputs.enabled == 'true' }}
        run: npx wrangler d1 migrations apply DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker
        if: ${{ steps.deploy_guard.outputs.enabled == 'true' }}
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
