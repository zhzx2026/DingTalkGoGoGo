name: Deploy Worker

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install

      - name: Sync worker secrets
        run: |
          printf '%s' "${WORKER_API_TOKEN}" | npx wrangler secret put WORKER_API_TOKEN
          printf '%s' "${ORIGIN_SHARED_TOKEN}" | npx wrangler secret put ORIGIN_SHARED_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_API_TOKEN: ${{ secrets.WORKER_API_TOKEN }}
          ORIGIN_SHARED_TOKEN: ${{ secrets.ORIGIN_SHARED_TOKEN }}

      - name: Deploy worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
