name: 部署 Worker

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 Wrangler 依赖
        run: npm install

      - name: 检查 Worker TypeScript
        run: npm run typecheck

      - name: 检查部署凭据
        id: deploy_guard
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "缺少 Cloudflare 凭据，跳过远程部署。"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 同步 Worker Secrets
        if: ${{ steps.deploy_guard.outputs.enabled == 'true' }}
        run: |
          printf '%s' "${INTERNAL_API_TOKEN}" | npx wrangler secret put INTERNAL_API_TOKEN
          printf '%s' "${GITHUB_ACTIONS_TOKEN}" | npx wrangler secret put GITHUB_ACTIONS_TOKEN
          if [ -n "${AUTH_SALT}" ]; then
            printf '%s' "${AUTH_SALT}" | npx wrangler secret put AUTH_SALT
          fi
          if [ -n "${BOOTSTRAP_USERNAME}" ]; then
            printf '%s' "${BOOTSTRAP_USERNAME}" | npx wrangler secret put BOOTSTRAP_USERNAME
          fi
          if [ -n "${BOOTSTRAP_PASSWORD}" ]; then
            printf '%s' "${BOOTSTRAP_PASSWORD}" | npx wrangler secret put BOOTSTRAP_PASSWORD
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INTERNAL_API_TOKEN: ${{ secrets.GODINGTALK_INTERNAL_TOKEN }}
          GITHUB_ACTIONS_TOKEN: ${{ secrets.GODINGTALK_GITHUB_ACTIONS_TOKEN }}
          AUTH_SALT: ${{ secrets.GODINGTALK_AUTH_SALT }}
          BOOTSTRAP_USERNAME: ${{ secrets.GODINGTALK_BOOTSTRAP_USERNAME }}
          BOOTSTRAP_PASSWORD: ${{ secrets.GODINGTALK_BOOTSTRAP_PASSWORD }}

      - name: 应用 D1 迁移
        if: ${{ steps.deploy_guard.outputs.enabled == 'true' }}
        run: npx wrangler d1 migrations apply DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 部署 Worker
        if: ${{ steps.deploy_guard.outputs.enabled == 'true' }}
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
