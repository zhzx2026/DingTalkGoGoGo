name: Deploy Worker

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install

      - name: Typecheck worker
        run: npm run typecheck

      - name: Sync worker secrets
        run: |
          printf '%s' "${INTERNAL_API_TOKEN}" | npx wrangler secret put INTERNAL_API_TOKEN
          printf '%s' "${GITHUB_ACTIONS_TOKEN}" | npx wrangler secret put GITHUB_ACTIONS_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INTERNAL_API_TOKEN: ${{ secrets.GODINGTALK_INTERNAL_TOKEN }}
          GITHUB_ACTIONS_TOKEN: ${{ secrets.GODINGTALK_GITHUB_ACTIONS_TOKEN }}

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
