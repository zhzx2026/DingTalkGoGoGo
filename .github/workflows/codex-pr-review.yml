name: Codex 审核 PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: 需要审核的 PR 编号
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  codex_review:
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.codex.outputs.final-message }}
      pr_number: ${{ steps.meta.outputs.pr_number }}
    steps:
      - name: 检查 Codex Secret
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_ENDPOINT: ${{ secrets.CODEX_RESPONSES_API_ENDPOINT }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::error::缺少 OPENAI_API_KEY secret，无法启动 Codex。"
            exit 1
          fi
          if [ -z "${CODEX_ENDPOINT}" ]; then
            echo "::error::缺少 CODEX_RESPONSES_API_ENDPOINT secret，无法连接自定义 Codex 端点。"
            exit 1
          fi

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 Codex CLI
        shell: bash
        run: npm install -g @openai/codex

      - name: 生成 Codex 配置
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAW_ENDPOINT: ${{ secrets.CODEX_RESPONSES_API_ENDPOINT }}
        run: |
          base_url="$(printf '%s' "${RAW_ENDPOINT}" | tr -d '[:space:]')"
          base_url="${base_url%/}"

          export CODEX_HOME_DIR="${RUNNER_TEMP}/codex-home"
          mkdir -p "${CODEX_HOME_DIR}"

          cat > "${CODEX_HOME_DIR}/config.toml" <<EOF
          model_provider = "OpenAI"
          model = "gpt-5.4"
          review_model = "gpt-5.4"
          model_reasoning_effort = "xhigh"
          disable_response_storage = true
          network_access = "enabled"
          model_context_window = 1000000
          model_auto_compact_token_limit = 900000

          [model_providers.OpenAI]
          name = "OpenAI"
          base_url = "${base_url}"
          wire_api = "responses"
          requires_openai_auth = true
          EOF

          cat > "${CODEX_HOME_DIR}/auth.json" <<EOF
          {"OPENAI_API_KEY":"${OPENAI_API_KEY}"}
          EOF

          chmod 600 "${CODEX_HOME_DIR}/auth.json"
          echo "CODEX_HOME=${CODEX_HOME_DIR}" >> "$GITHUB_ENV"

      - name: 解析 PR 元数据
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_PR_NUMBER: ${{ inputs.pull_request_number }}
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            pr_number="${{ github.event.pull_request.number }}"
          else
            pr_number="${INPUT_PR_NUMBER}"
          fi

          gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" > /tmp/pr.json

          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"
          echo "base_ref=$(jq -r '.base.ref' /tmp/pr.json)" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(jq -r '.base.sha' /tmp/pr.json)" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(jq -r '.head.sha' /tmp/pr.json)" >> "$GITHUB_OUTPUT"
          echo "title<<EOF" >> "$GITHUB_OUTPUT"
          jq -r '.title' /tmp/pr.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          jq -r '.body // ""' /tmp/pr.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 预抓取 PR 基线与 Head
        env:
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          PR_BASE_REF: ${{ steps.meta.outputs.base_ref }}
        shell: bash
        run: |
          git fetch --no-tags origin \
            "${PR_BASE_REF}" \
            "+refs/pull/${PR_NUMBER}/head:refs/remotes/origin/pr/${PR_NUMBER}"

      - name: 运行 Codex 审核
        id: codex
        shell: bash
        run: |
          mkdir -p .codex-tmp
          cat > .codex-tmp/pr-review-prompt.md <<EOF
          你正在审核 GitHub Pull Request #${{ steps.meta.outputs.pr_number }}，仓库是 \`${{ github.repository }}\`。

          PR 标题：
          ${{ steps.meta.outputs.title }}

          PR 描述：
          ${{ steps.meta.outputs.body }}

          请只审核这次 PR 引入的改动，重点找：
          1. 真实 bug
          2. 行为回归风险
          3. 缺失校验或测试
          4. 安全和自动化风险

          可参考的比较范围：
          - base sha: ${{ steps.meta.outputs.base_sha }}
          - head sha: ${{ steps.meta.outputs.head_sha }}
          - 建议先看：git diff --stat ${{ steps.meta.outputs.base_sha }}...refs/remotes/origin/pr/${{ steps.meta.outputs.pr_number }}
          - 再看：git diff ${{ steps.meta.outputs.base_sha }}...refs/remotes/origin/pr/${{ steps.meta.outputs.pr_number }}

          输出要求：
          - 如果有问题，按严重度列出具体发现。
          - 如果没有明确问题，请明确写“未发现明确问题”，并补充剩余风险。
          - 保持简洁，适合直接作为 PR 评论。
          EOF

          output_file="${RUNNER_TEMP}/codex-pr-review-output.md"
          codex exec \
            --skip-git-repo-check \
            --cd "${GITHUB_WORKSPACE}" \
            --sandbox read-only \
            --model gpt-5.4 \
            --config 'model_reasoning_effort="xhigh"' \
            --output-last-message "${output_file}" \
            < .codex-tmp/pr-review-prompt.md

          {
            echo "final-message<<EOF"
            cat "${output_file}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  post_review:
    if: ${{ needs.codex_review.outputs.final_message != '' }}
    runs-on: ubuntu-latest
    needs: codex_review
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: 回帖 PR 审核结果
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex_review.outputs.final_message }}
          PR_NUMBER: ${{ needs.codex_review.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: process.env.CODEX_FINAL_MESSAGE,
            });
