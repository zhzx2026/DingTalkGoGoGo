name: Codex 审核 PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: 需要审核的 PR 编号
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  codex_review:
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.codex.outputs.final-message }}
      pr_number: ${{ steps.meta.outputs.pr_number }}
    steps:
      - name: 解析 PR 元数据
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_PR_NUMBER: ${{ inputs.pull_request_number }}
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            pr_number="${{ github.event.pull_request.number }}"
          else
            pr_number="${INPUT_PR_NUMBER}"
          fi

          gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" > /tmp/pr.json

          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"
          echo "base_ref=$(jq -r '.base.ref' /tmp/pr.json)" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(jq -r '.base.sha' /tmp/pr.json)" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(jq -r '.head.sha' /tmp/pr.json)" >> "$GITHUB_OUTPUT"
          echo "title<<EOF" >> "$GITHUB_OUTPUT"
          jq -r '.title' /tmp/pr.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          jq -r '.body // ""' /tmp/pr.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 预抓取 PR 基线与 Head
        env:
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          PR_BASE_REF: ${{ steps.meta.outputs.base_ref }}
        shell: bash
        run: |
          git fetch --no-tags origin \
            "${PR_BASE_REF}" \
            "+refs/pull/${PR_NUMBER}/head:refs/remotes/origin/pr/${PR_NUMBER}"

      - name: 运行 Codex 审核
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          responses-api-endpoint: ${{ secrets.CODEX_RESPONSES_API_ENDPOINT }}
          sandbox: read-only
          safety-strategy: read-only
          allow-bots: true
          prompt: |
            你正在审核 GitHub Pull Request #${{ steps.meta.outputs.pr_number }}，仓库是 `${{ github.repository }}`。

            PR 标题：
            ${{ steps.meta.outputs.title }}

            PR 描述：
            ${{ steps.meta.outputs.body }}

            请只审核这次 PR 引入的改动，重点找：
            1. 真实 bug
            2. 行为回归风险
            3. 缺失校验或测试
            4. 安全和自动化风险

            可参考的比较范围：
            - base sha: ${{ steps.meta.outputs.base_sha }}
            - head sha: ${{ steps.meta.outputs.head_sha }}
            - 建议先看：git diff --stat ${{ steps.meta.outputs.base_sha }}...refs/remotes/origin/pr/${{ steps.meta.outputs.pr_number }}
            - 再看：git diff ${{ steps.meta.outputs.base_sha }}...refs/remotes/origin/pr/${{ steps.meta.outputs.pr_number }}

            输出要求：
            - 如果有问题，按严重度列出具体发现。
            - 如果没有明确问题，请明确写“未发现明确问题”，并补充剩余风险。
            - 保持简洁，适合直接作为 PR 评论。

  post_review:
    if: ${{ needs.codex_review.outputs.final_message != '' }}
    runs-on: ubuntu-latest
    needs: codex_review
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: 回帖 PR 审核结果
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex_review.outputs.final_message }}
          PR_NUMBER: ${{ needs.codex_review.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: process.env.CODEX_FINAL_MESSAGE,
            });
