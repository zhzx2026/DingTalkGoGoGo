name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          PROJECT_NAME="GoDingtalk"
          mkdir -p build

          GOOS=windows GOARCH=amd64 go build -ldflags "-w -s -X main.Version=${VERSION}" -o build/${PROJECT_NAME}_${VERSION}_windows_amd64.exe
          GOOS=windows GOARCH=arm64 go build -ldflags "-w -s -X main.Version=${VERSION}" -o build/${PROJECT_NAME}_${VERSION}_windows_arm64.exe
          GOOS=darwin  GOARCH=arm64 go build -ldflags "-w -s -X main.Version=${VERSION}" -o build/${PROJECT_NAME}_${VERSION}_darwin_arm64
          GOOS=darwin  GOARCH=amd64 go build -ldflags "-w -s -X main.Version=${VERSION}" -o build/${PROJECT_NAME}_${VERSION}_darwin_amd64
          GOOS=linux   GOARCH=amd64 go build -ldflags "-w -s -X main.Version=${VERSION}" -o build/${PROJECT_NAME}_${VERSION}_linux_amd64
          GOOS=linux   GOARCH=arm64 go build -ldflags "-w -s -X main.Version=${VERSION}" -o build/${PROJECT_NAME}_${VERSION}_linux_arm64

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/godingtalk-server
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
