name: 发布软件

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: 配置 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: 运行 Go 测试
        run: go test ./...

      - name: 构建多平台二进制
        run: |
          VERSION=${GITHUB_REF_NAME}
          PROJECT_NAME="GoDingtalk"
          mkdir -p build

          GOOS=windows GOARCH=amd64 go build -ldflags "-w -s -X main.Version=${VERSION}" -o build/${PROJECT_NAME}_${VERSION}_windows_amd64.exe
          GOOS=windows GOARCH=arm64 go build -ldflags "-w -s -X main.Version=${VERSION}" -o build/${PROJECT_NAME}_${VERSION}_windows_arm64.exe
          GOOS=darwin  GOARCH=arm64 go build -ldflags "-w -s -X main.Version=${VERSION}" -o build/${PROJECT_NAME}_${VERSION}_darwin_arm64
          GOOS=darwin  GOARCH=amd64 go build -ldflags "-w -s -X main.Version=${VERSION}" -o build/${PROJECT_NAME}_${VERSION}_darwin_amd64
          GOOS=linux   GOARCH=amd64 go build -ldflags "-w -s -X main.Version=${VERSION}" -o build/${PROJECT_NAME}_${VERSION}_linux_amd64
          GOOS=linux   GOARCH=arm64 go build -ldflags "-w -s -X main.Version=${VERSION}" -o build/${PROJECT_NAME}_${VERSION}_linux_arm64

      - name: 构建 Android APK
        env:
          GODINGTALK_APP_VERSION: ${{ github.ref_name }}
          GODINGTALK_APP_VERSION_CODE: ${{ github.run_number }}
          GODINGTALK_CONSOLE_URL: ${{ secrets.GODINGTALK_CONTROL_URL }}
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          gradle -p android assembleRelease
          cp android/app/build/outputs/apk/release/app-release.apk build/GoDingtalk_${GITHUB_REF_NAME}_android.apk

      - name: 上传构建产物到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/godingtalk-server
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
